<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Devaa Edits | Lyrics & Cinematic Videos</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(-45deg,#ff006e,#8338ec,#3a86ff,#06d6a0);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter:blur(12px);
background:rgba(255,255,255,.1);
position:sticky;
top:0;
}

.logo{
font-size:28px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin:10px;
font-weight:bold;
}

.hero{
min-height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

.hero-box{
background:rgba(255,255,255,.12);
padding:30px;
border-radius:25px;
backdrop-filter:blur(14px);
max-width:700px;
}

.hero h1{
font-size:48px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
line-height:1.6;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 24px;
background:white;
color:black;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

section{
padding:60px 20px;
}

.title{
text-align:center;
font-size:35px;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.1);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-bottom:20px;
}

iframe{
width:100
